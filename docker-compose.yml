services:
  db:
    image: postgres:16
    container_name: hackathon-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
    # Use a named volume instead of mounting a host folder for clean init
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql

  api:
    image: vlungusst/hackathon-api:latest
    container_name: hackathon-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000

# Define the named volume
volumes:
  db_data:
